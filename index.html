// --- DYNAMIC SCRIPT LOADER ---
const loadScript = (src) => {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const script = document.createElement('script');
    script.src = src;
    script.onload = () => {
        script.setAttribute('data-loaded', 'true');
        resolve();
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

// --- ADVANCED PROCEDURAL TEXTURES (Powers Brown Aesthetic) ---
const createGlassTexture = () => {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f172a'; 
  ctx.fillRect(0, 0, 512, 512);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; 
  ctx.lineWidth = 2;
  for(let y=0; y<512; y+=32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke(); }
  for(let x=0; x<512; x+=32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke(); }
  return canvas;
};

const createEmissiveTexture = () => {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, 512, 512);
  for(let x = 2; x < 512; x += 32) {
    for(let y = 2; y < 512; y += 32) {
      if(Math.random() > 0.8) {
        ctx.fillStyle = Math.random() > 0.5 ? '#fde68a' : '#e0f2fe'; 
        ctx.fillRect(x, y, 28, 28);
      }
    }
  }
  return canvas;
};

const createStreetTexture = () => {
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#020617'; 
  ctx.fillRect(0, 0, 1024, 1024);
  for(let i=0; i<15000; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);
  }
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; 
  ctx.setLineDash([10, 15]);
  ctx.lineWidth = 2;
  for(let i = 0; i < 1024; i += 128) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1024); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1024, i); ctx.stroke();
  }
  return canvas;
};

const mapDataLabels = [

// --- GEMINI AI INTEGRATION ---
const generateGeminiContent = async (prompt, systemInstruction = "") => {
  const apiKey = ""; // API key is automatically injected by the execution environment
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const payload = {
    contents: [{ parts: [{ text: prompt }] }]
  };
  if (systemInstruction) {
    payload.systemInstruction = { parts: [{ text: systemInstruction }] };
  }

  let retries = 5;
  let delay = 1000;
  while (retries > 0) {
    try {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "No content generated.";
    } catch (error) {
      retries--;
      if (retries === 0) return "AI service is currently unavailable. Please try again later.";
      await new Promise(resolve => setTimeout(resolve, delay));
      delay *= 2; // Exponential backoff: 1s, 2s, 4s, 8s, 16s
    }
  }
};

// --- HYPER-REALISTIC SPATIAL ENGINE ---
const ProprietarySpatialEngine = ({ labelsContainerRef, onNodeClick, isExplorationMode, interiorTarget }) => {
  const mountRef = useRef(null);
  const [isLoaded, setIsLoaded] = useState(false);
  const interiorRef = useRef(interiorTarget);
  const onNodeClickRef = useRef(onNodeClick);
  const modeRef = useRef(isExplorationMode);
  
  useEffect(() => { interiorRef.current = interiorTarget; }, [interiorTarget]);
  useEffect(() => { onNodeClickRef.current = onNodeClick; }, [onNodeClick]);
  useEffect(() => { modeRef.current = isExplorationMode; }, [isExplorationMode]);

  useEffect(() => {
    let isCancelled = false;
    let scene, camera, renderer, animationFrameId, controls, raycaster, mouse;
    let interactableObjects = [];
    let trafficParticles, stars;
    let labelElements = []; 
    let podGroup;
    
    let flightState = {
      isFlying: false,
      targetPos: null,
      targetLookAt: null,
    };
    let cinematicAngle = 0;
    let hoveredObject = null;
    let wasInInterior = false;

    const isMobile = window.innerWidth < 768;
    const buildingCount = isMobile ? 800 : 2500;
    const starCount = isMobile ? 2000 : 6000;
    const trafficCount = isMobile ? 1500 : 3500;
    const corridorLength = 5000;

    const initThreeJS = async () => {
      try {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
        await loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js');

        if (isCancelled) return;
        const THREE = window.THREE;
        
        const width = Math.max(1, mountRef.current.clientWidth || window.innerWidth);
        const height = Math.max(1, mountRef.current.clientHeight || window.innerHeight);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        flightState.targetPos = new THREE.Vector3();
        flightState.targetLookAt = new THREE.Vector3();

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617); 
        scene.fog = new THREE.FogExp2(0x020617, 0.0008); 

        camera = new THREE.PerspectiveCamera(45, width / height, 1, 15000);
        camera.position.set(-800, 500, 1000); 

        renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = !isMobile; 
        if (!isMobile) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        
        renderer.domElement.style.width = '100%';
        renderer.domElement.style.height = '100%';
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        mountRef.current.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.02; 
        controls.minDistance = 50; 
        controls.maxDistance = 4000;
        controls.target.set(0, 50, 0);

        scene.add(new THREE.AmbientLight(0x0f172a, 2.0)); 
        
        const moonLight = new THREE.DirectionalLight(0xe0f2fe, 0.6);
        moonLight.position.set(1000, 2000, 500);
        if (!isMobile) {
          moonLight.castShadow = true;
          moonLight.shadow.mapSize.width = 2048;
          moonLight.shadow.mapSize.height = 2048;
          moonLight.shadow.camera.near = 100;
          moonLight.shadow.camera.far = 5000;
          moonLight.shadow.camera.left = -2000;
          moonLight.shadow.camera.right = 2000;
          moonLight.shadow.camera.top = 2000;
          moonLight.shadow.camera.bottom = -2000;
        }
        scene.add(moonLight);

        const orangeGlow = new THREE.PointLight(0xd8833b, 2.0, 3000); 
        orangeGlow.position.set(0, 200, 0);
        scene.add(orangeGlow);

        const greenGlow = new THREE.PointLight(0x1a3632, 3.0, 2500);
        greenGlow.position.set(-500, 100, -500);
        scene.add(greenGlow);

        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) {
          starPos[i] = (Math.random() - 0.5) * 12000;
          starPos[i+1] = Math.random() * 5000 + 500; 
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: isMobile ? 1.5 : 2.5, transparent: true, opacity: 0.9});
        stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        const groundTex = new THREE.CanvasTexture(createStreetTexture());
        groundTex.wrapS = THREE.RepeatWrapping; groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(40, 40);

        const groundMat = new THREE.MeshStandardMaterial({ 
          map: groundTex, color: 0x020617, roughness: 0.1, metalness: 0.9 
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(15000, 15000), groundMat);
        ground.rotation.x = -Math.PI / 2;
        if (!isMobile) ground.receiveShadow = true;
        scene.add(ground);

        const glassTex = new THREE.CanvasTexture(createGlassTexture());
        glassTex.wrapS = THREE.RepeatWrapping; glassTex.wrapT = THREE.RepeatWrapping;
        const emissiveTex = new THREE.CanvasTexture(createEmissiveTexture());
        emissiveTex.wrapS = THREE.RepeatWrapping; emissiveTex.wrapT = THREE.RepeatWrapping;
        
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        const glassMat = new THREE.MeshStandardMaterial({ 
          map: glassTex, emissiveMap: emissiveTex, emissive: new THREE.Color(0xffffff), emissiveIntensity: 1.0,
          roughness: 0.1, metalness: 0.9, color: 0x1e293b
        });

        const blockSize = 60;
        const streetWidth = 25;
        const cityLimit = isMobile ? 1200 : 2500;
        const corridorWidth = 250;

        const bldgInstanced = new THREE.InstancedMesh(buildingGeo, glassMat, buildingCount);
        if (!isMobile) { bldgInstanced.castShadow = true; bldgInstanced.receiveShadow = true; }
        scene.add(bldgInstanced);

        const dummy = new THREE.Object3D();
        let bldgIndex = 0;

        for (let x = -cityLimit; x <= cityLimit; x += (blockSize + streetWidth)) {
          for (let z = -cityLimit; z <= cityLimit; z += (blockSize + streetWidth)) {
            if (bldgIndex >= buildingCount) break;
            if (Math.abs(x) < corridorWidth / 2 + 30) continue; 
            if (Math.random() > 0.8) continue;

            let h = (Math.random() * 80) + 30;
            if (Math.abs(x) > 400 && Math.abs(z) > 400) h += (Math.random() * 400); 
            
            const bw = Math.random() * (blockSize - 10) + 20;
            const bd = Math.random() * (blockSize - 10) + 20;
            const bx = x + (Math.random() * (blockSize - bw)) - (blockSize/2 - bw/2);
            const bz = z + (Math.random() * (blockSize - bd)) - (blockSize/2 - bd/2);

            dummy.position.set(bx, h / 2, bz);
            dummy.scale.set(bw, h, bd);
            dummy.updateMatrix();
            bldgInstanced.setMatrixAt(bldgIndex++, dummy.matrix);
          }
        }
        bldgInstanced.instanceMatrix.needsUpdate = true;

        const trenchGeo = new THREE.BoxGeometry(corridorWidth, 5, corridorLength);
        const trenchMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.8 });
        const trench = new THREE.Mesh(trenchGeo, trenchMat);
        trench.position.y = 2.5;
        if (!isMobile) trench.receiveShadow = true;
        scene.add(trench);

        const tubeRadius = 15;
        const tubeGeo = new THREE.CylinderGeometry(tubeRadius, tubeRadius, corridorLength, 32);
        const tubeMat = new THREE.MeshPhysicalMaterial({ 
          color: 0xffffff, transmission: 0.95, opacity: 1, roughness: 0.05, metalness: 0.2, transparent: true
        });
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.rotation.x = Math.PI / 2;
        tube.position.set(0, 20, 0);
        scene.add(tube);

        const ringGeo = new THREE.TorusGeometry(16, 1.5, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x5e24ff, emissive: 0x5e24ff, emissiveIntensity: 2.0 });
        for(let z = -corridorLength/2; z < corridorLength/2; z += 150) {
           const ring = new THREE.Mesh(ringGeo, ringMat);
           ring.position.set(0, 20, z);
           scene.add(ring);
        }

        podGroup = new THREE.Group();
        podGroup.position.set(0, 20, 0);
        const podShell = new THREE.Mesh(new THREE.CylinderGeometry(10, 10, 80, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.9, roughness: 0.1 }));
        podShell.rotation.x = Math.PI / 2;
        podGroup.add(podShell);
        
        const podGlow = new THREE.Mesh(new THREE.CylinderGeometry(10.2, 10.2, 60, 16), new THREE.MeshStandardMaterial({ color: 0xd8833b, emissive: 0xd8833b, emissiveIntensity: 2.0, transparent: true, opacity: 0.8 }));
        podGlow.rotation.x = Math.PI / 2;
        podGroup.add(podGlow);
        podGroup.add(new THREE.PointLight(0xd8833b, 5.0, 300));
        scene.add(podGroup);

        const buildSphere = (zPos) => {
          const group = new THREE.Group();
          group.position.set(0, 0, zPos);

          const core = new THREE.Mesh(
            new THREE.SphereGeometry(90, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.85),
            new THREE.MeshPhysicalMaterial({ color: 0x1a3632, transmission: 0.9, opacity: 1, roughness: 0.1, metalness: 0.3, side: THREE.DoubleSide })
          );
          core.position.y = 90;
          group.add(core);

          const louverMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.2, metalness: 0.6 });
          for(let y = 20; y <= 170; y += 15) {
             const dy = Math.abs(y - 90);
             if (dy > 85) continue;
             const radius = Math.sqrt(90*90 - dy*dy) + 3; 
             const louver = new THREE.Mesh(new THREE.TorusGeometry(radius, 1.5, 16, 64), louverMat);
             louver.rotation.x = Math.PI / 2;
             louver.position.y = y;
             if (!isMobile) louver.castShadow = true;
             group.add(louver);
          }

          const innerCore = new THREE.Mesh(new THREE.CylinderGeometry(15, 15, 180, 16), new THREE.MeshStandardMaterial({ color: 0x5e24ff, emissive: 0x5e24ff, emissiveIntensity: 1.5 }));
          innerCore.position.y = 90;
          group.add(innerCore);
          group.add(new THREE.PointLight(0x5e24ff, 4.0, 200).translateY(90));

          const hitBox = new THREE.Mesh(new THREE.BoxGeometry(190, 190, 190), new THREE.MeshBasicMaterial({visible:false}));
          hitBox.position.y = 90;
          hitBox.userData = { 
            id: `RECLAIM-HUB-${zPos}`, type: 'Cultural Sphere', 
            desc: 'A geodesic structure housing public parks and community gathering spaces. Funded by Reclaim East Oakland.', 
            camPos: new THREE.Vector3(250, 150, zPos + 250), interiorCamPos: new THREE.Vector3(40, 80, zPos + 40), interiorLookAt: new THREE.Vector3(0, 90, zPos)
          };
          group.add(hitBox);
          interactableObjects.push(hitBox);

          scene.add(group);
        };

        const buildMegaHub = (zPos) => {
          const group = new THREE.Group();
          group.position.set(0, 0, zPos);

          const roof = new THREE.Mesh(
            new THREE.BoxGeometry(corridorWidth + 100, 8, 400),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.3 })
          );
          roof.position.y = 140;
          if (!isMobile) roof.castShadow = true;
          group.add(roof);

          const glassWalls = new THREE.Mesh(
            new THREE.BoxGeometry(corridorWidth + 80, 140, 380),
            new THREE.MeshPhysicalMaterial({ color: 0x1e293b, transmission: 0.95, roughness: 0.05, transparent: true, side: THREE.BackSide })
          );
          glassWalls.position.y = 70;
          group.add(glassWalls);

          const hitBox = new THREE.Mesh(new THREE.BoxGeometry(corridorWidth + 100, 150, 400), new THREE.MeshBasicMaterial({visible:false}));
          hitBox.position.y = 75;
          hitBox.userData = { 
            id: 'VISION980-HUB', type: 'Mega-Hub Transit Center', 
            desc: 'Multi-level civic connector spanning the I-980 trench. Reconnecting West Oakland to Downtown.', 
            camPos: new THREE.Vector3(300, 200, zPos + 300), interiorCamPos: new THREE.Vector3(80, 70, zPos + 120), interiorLookAt: new THREE.Vector3(0, 40, zPos)
          };
          group.add(hitBox);
          interactableObjects.push(hitBox);

          scene.add(group);
        };

        buildSphere(-800); 
        buildMegaHub(0);          
        buildSphere(800);  

        const tGeo = new THREE.BufferGeometry();
        const tPos = new Float32Array(trafficCount * 3);
        const tSpeed = new Float32Array(trafficCount);
        for(let i=0; i<trafficCount; i++) {
          tPos[i*3] = (Math.random() - 0.5) * cityLimit * 2;
          tPos[i*3+1] = 2; 
          tPos[i*3+2] = (Math.random() - 0.5) * cityLimit * 2;
          tSpeed[i] = Math.random() * 3 + 1;
        }
        tGeo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
        const tMat = new THREE.PointsMaterial({ color: 0xffffff, size: isMobile ? 3 : 5, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        trafficParticles = new THREE.Points(tGeo, tMat);
        scene.add(trafficParticles);

        const updateMousePosition = (clientX, clientY) => {
          if (!mouse || !mountRef.current) return;
          const rect = mountRef.current.getBoundingClientRect();
          mouse.x = ((clientX - rect.left) / Math.max(1, rect.width)) * 2 - 1;
          mouse.y = -((clientY - rect.top) / Math.max(1, rect.height)) * 2 + 1;
        };

        const handlePointerMove = (event) => {
          if (!camera || !raycaster || !mouse || isCancelled) return;
          const clientX = event.touches ? event.touches[0].clientX : event.clientX;
          const clientY = event.touches ? event.touches[0].clientY : event.clientY;
          updateMousePosition(clientX, clientY);

          if (modeRef.current && !flightState.isFlying && !interiorRef.current) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);
            
            if (intersects.length > 0) {
              const object = intersects[0].object;
              if (hoveredObject !== object) {
                hoveredObject = object;
                document.body.style.cursor = 'pointer';
              }
            } else {
              if (hoveredObject) {
                hoveredObject = null;
                document.body.style.cursor = 'default';
              }
            }
          }
        };

        const handleInteraction = (event) => {
          if (!modeRef.current || interiorRef.current || flightState.isFlying || !camera || !raycaster || !mouse || isCancelled) return;
          
          if (event.touches && event.touches.length > 0) {
            updateMousePosition(event.touches[0].clientX, event.touches[0].clientY);
          }

          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObjects(interactableObjects);
          
          if (intersects.length > 0) {
            const object = intersects[0].object;
            if (object.userData && object.userData.type) {
              onNodeClickRef.current(object.userData);
              flightState.isFlying = true;
              if (object.userData.camPos) {
                 flightState.targetPos.copy(object.userData.camPos);
              }
              const tgtLook = new THREE.Vector3();
              object.getWorldPosition(tgtLook);
              flightState.targetLookAt.copy(tgtLook);
            }
          }
        };

        if (renderer.domElement) {
          renderer.domElement.addEventListener('pointermove', handlePointerMove);
          renderer.domElement.addEventListener('click', handleInteraction);
        }

        const resize = () => {
          if (!mountRef.current || !camera || !renderer) return;
          const width = Math.max(1, mountRef.current.clientWidth || window.innerWidth);
          const height = Math.max(1, mountRef.current.clientHeight || window.innerHeight);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height);
        };
        window.addEventListener('resize', resize);
        resize();

        if (labelsContainerRef.current) {
            labelsContainerRef.current.innerHTML = ''; 
            mapDataLabels.forEach((data) => {
                const el = document.createElement('div');
                const borderColor = data.color.replace('text-', 'border-').replace('400', '600');
                const bgColor = data.color.replace('text-', 'bg-');
                
                el.className = `absolute top-0 left-0 px-3 py-1.5 bg-[#0f172a]/90 backdrop-blur-md border ${borderColor}/50 rounded shadow-lg pointer-events-none whitespace-nowrap transition-opacity duration-100 flex items-center gap-2 font-mono text-[10px] md:text-xs z-10`;
                el.innerHTML = `
                    <span class="w-1.5 h-1.5 rounded-full ${data.expired ? 'bg-rose-500' : bgColor + ' animate-pulse'}"></span>
                    <span class="${data.expired ? 'text-slate-400 line-through' : 'text-slate-200'} font-medium">${data.text}</span>
                `;
                labelsContainerRef.current.appendChild(el);
                labelElements.push({ el, pos: new THREE.Vector3(data.pos[0], data.pos[1], data.pos[2]) });
            });
        }

        let podZ = -corridorLength/2;
        let podSpeed = 45;

        const animate = () => {
          if (isCancelled || !scene || !camera || !renderer) return;
          
          const altitude = camera.position.y;
          scene.fog.density = Math.max(0.0001, 0.0015 - (altitude * 0.0000008));
          if(stars) stars.material.opacity = Math.min(1.0, altitude / 800);

          if (interiorRef.current && !wasInInterior) {
              wasInInterior = true;
              flightState.isFlying = true;
              flightState.targetPos.copy(interiorRef.current.interiorCamPos);
              flightState.targetLookAt.copy(interiorRef.current.interiorLookAt);
          } else if (!interiorRef.current && wasInInterior) {
              wasInInterior = false;
              flightState.isFlying = true;
              flightState.targetPos.set(camera.position.x + 200, camera.position.y + 150, camera.position.z + 200);
          }

          if (flightState.isFlying) {
             controls.enabled = false;
             camera.position.lerp(flightState.targetPos, 0.04);
             controls.target.lerp(flightState.targetLookAt, 0.04);
             controls.update();
             if (camera.position.distanceTo(flightState.targetPos) < 2) flightState.isFlying = false;
          } else if (interiorRef.current || hoveredObject || modeRef.current) {
             controls.enabled = true;
             controls.update(); 
          } else {
             controls.enabled = false;
             cinematicAngle += 0.0005; 
             const radius = isMobile ? 800 : 1400;
             camera.position.x = Math.cos(cinematicAngle) * radius;
             camera.position.y = 600 + Math.sin(cinematicAngle * 2) * 100;
             camera.position.z = Math.sin(cinematicAngle) * radius;
             camera.lookAt(0, 100, 0);
          }

          if (trafficParticles) {
            const positions = trafficParticles.geometry.attributes.position.array;
            for(let i=0; i<trafficCount; i++) {
              positions[i*3+2] -= tSpeed[i]; 
              if(positions[i*3+2] < -cityLimit) positions[i*3+2] = cityLimit; 
            }
            trafficParticles.geometry.attributes.position.needsUpdate = true;
          }

          if (podGroup) {
             podZ += podSpeed;
             if(podZ > corridorLength/2 || podZ < -corridorLength/2) podSpeed *= -1;
             podGroup.position.z = podZ;
          }

          if (labelsContainerRef.current && labelElements.length > 0) {
              const widthHalf = window.innerWidth / 2;
              const heightHalf = window.innerHeight / 2;
              labelElements.forEach(item => {
                  const vec = item.pos.clone();
                  vec.project(camera);
                  if(vec.z > 1 || !modeRef.current) {
                     item.el.style.opacity = 0;
                  } else {
                     const x = (vec.x * widthHalf) + widthHalf;
                     const y = -(vec.y * heightHalf) + heightHalf;
                     item.el.style.opacity = 1;
                     item.el.style.transform = `translate(${x + 10}px, ${y - 20}px)`;
                  }
              });
          }

          renderer.render(scene, camera);
          animationFrameId = requestAnimationFrame(animate);
        };

        setIsLoaded(true);
        setTimeout(() => { if (!isCancelled) animate(); }, 50);

      } catch (error) {
        console.error("Three.js initialization failed:", error);
        setIsLoaded(true); 
      }
    };

    initThreeJS();

    return () => {
      isCancelled = true;
      window.removeEventListener('resize', resize);
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      if (renderer) {
        if (renderer.domElement) {
           renderer.domElement.removeEventListener('pointermove', handlePointerMove);
           renderer.domElement.removeEventListener('click', handleInteraction);
        }
        renderer.dispose();
      }
      if (mountRef.current && renderer && renderer.domElement) {
        mountRef.current.removeChild(renderer.domElement);
      }
      if (labelsContainerRef.current) labelsContainerRef.current.innerHTML = '';
    };
  }, []); 

  return (
    <>
      {!isLoaded && (
        <div className="absolute inset-0 flex items-center justify-center bg-[#020617] z-50">
          <div className="text-[#d8833b] font-mono font-bold text-lg flex flex-col items-center tracking-widest uppercase">
            <Activity className="w-8 h-8 mb-4 animate-spin text-[#d8833b]" />
            Initializing Vision 980 Engine...
          </div>
        </div>
      )}
      <div 
        ref={mountRef} 
        className={`fixed top-0 left-0 w-full h-full z-0 outline-none transition-opacity duration-1000 ${isExplorationMode ? 'opacity-100' : 'opacity-60 pointer-events-none'}`} 
        style={{ cursor: isExplorationMode ? 'grab' : 'default', touchAction: isExplorationMode ? 'none' : 'auto' }} 
      />
    </>
  );
};
